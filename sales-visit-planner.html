<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>飛び込みプランナー - LIENS BOT</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;min-height:100vh;background:linear-gradient(180deg,#f8fafc 0%,#eef2f7 100%)}
.wrapper{display:flex;min-height:100vh}
.container{max-width:480px;width:100%;margin:0 auto;padding:16px 12px;position:relative;min-height:100vh}
.map-panel{display:none;flex:1;position:sticky;top:0;height:100vh;background:#e2e8f0;flex-direction:column}
.map-panel iframe{flex:1;width:100%;height:100%;border:none}
.map-setup{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:32px;text-align:center;gap:16px}
.map-setup h2{font-size:18px;font-weight:800;color:#1e293b}
.map-setup p{font-size:13px;color:#64748b;line-height:1.6;max-width:360px}
.map-setup ol{text-align:left;font-size:13px;color:#475569;line-height:2;max-width:360px}
.map-setup input{padding:10px 12px;border-radius:10px;border:1.5px solid #e2e8f0;font-size:14px;width:100%;max-width:360px;outline:none;background:#fff;font-family:inherit}
.map-setup .btn{margin-top:4px}
.map-url-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fff;border-bottom:1px solid #e2e8f0}
.map-url-bar input{flex:1;padding:6px 10px;border-radius:8px;border:1.5px solid #e2e8f0;font-size:12px;outline:none;background:#f8fafc;font-family:inherit}
.map-url-bar button{font-size:12px;padding:6px 12px}
@media(min-width:768px){
  .wrapper{flex-direction:row}
  .container{max-width:420px;flex-shrink:0;overflow-y:auto;height:100vh}
  .map-panel{display:flex}
}
.header{margin-bottom:16px}
.header h1{font-size:20px;font-weight:900;color:#0f172a;letter-spacing:-0.5px}
.header p{font-size:11px;color:#94a3b8;font-weight:500}
.top-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.top-row input[type=date]{padding:6px 10px;border-radius:10px;border:1.5px solid #e2e8f0;font-size:14px;font-weight:600;background:#f8fafc;outline:none;font-family:inherit}
.btn-route{display:flex;align-items:center;gap:4px;background:#3b82f6;color:#fff;border:none;padding:6px 12px;font-size:13px;border-radius:10px;font-weight:600;cursor:pointer}
.summary{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.summary span{font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px}
.filters{display:flex;gap:4px;margin-bottom:14px;overflow-x:auto}
.filter-btn{padding:4px 10px;border-radius:8px;border:1.5px solid #e2e8f0;background:#fff;font-size:11px;font-weight:600;color:#94a3b8;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit}
.filter-btn.active{background:#0f172a;color:#fff;border-color:#0f172a}
.cards{display:flex;flex-direction:column;gap:8px;padding-bottom:80px}
.card{background:#fff;border-radius:14px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);border:1px solid #f1f5f9;transition:transform 0.15s,box-shadow 0.15s}
.card.dragging{opacity:0.4;transform:scale(0.97)}
.card.drag-over{border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,.3)}
.drag-handle{cursor:grab;padding:4px 2px;border-radius:4px;display:flex;align-items:center;flex-shrink:0;color:#cbd5e1;touch-action:none}
.drag-handle:active{cursor:grabbing}
.card-header{display:flex;align-items:center;gap:8px}
.order-badge{width:26px;height:26px;border-radius:8px;background:#0f172a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-name{font-weight:700;font-size:15px;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-cat{font-size:12px;color:#64748b;margin-top:2px}
.status-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px;flex-shrink:0}
.icon-btn{background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;display:flex;align-items:center;justify-content:center}
.addr-row{display:flex;align-items:center;gap:6px;margin-top:8px}
.map-btn{display:flex;align-items:center;gap:3px;padding:3px 8px;border-radius:8px;border:1px solid #bfdbfe;background:#eff6ff;color:#3b82f6;cursor:pointer;flex-shrink:0;font-size:12px;font-family:inherit}
.hp-btn{display:flex;align-items:center;gap:3px;padding:3px 8px;border-radius:8px;border:1px solid #c4b5fd;background:#f5f3ff;color:#7c3aed;cursor:pointer;flex-shrink:0;font-size:12px;font-family:inherit}
.addr-text{font-size:12px;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.expanded{margin-top:10px;padding-top:10px;border-top:1px solid #f1f5f9}
.memo-text{font-size:13px;color:#475569;line-height:1.5;margin-bottom:10px;white-space:pre-wrap}
.hp-row{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.hp-url{font-size:12px;color:#7c3aed;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.status-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.status-btn{font-size:11px;font-weight:500;padding:4px 10px;border-radius:8px;border:1.5px solid #e2e8f0;background:#fff;cursor:pointer;font-family:inherit}
.action-row{display:flex;gap:6px;justify-content:space-between}
.action-group{display:flex;gap:6px}
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:16px;background:#0f172a;color:#fff;border:none;box-shadow:0 4px 14px rgba(15,23,42,.35);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px 32px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-header span{font-weight:800;font-size:16px;color:#1e293b}
.form-stack{display:flex;flex-direction:column;gap:10px}
.form-stack input,.form-stack select,.form-stack textarea{padding:10px 12px;border-radius:10px;border:1.5px solid #e2e8f0;font-size:14px;outline:none;width:100%;background:#f8fafc;font-family:inherit}
.form-stack textarea{min-height:70px;resize:vertical}
.btn{padding:10px 16px;border-radius:10px;border:1.5px solid #e2e8f0;background:#fff;font-size:14px;font-weight:600;cursor:pointer;text-align:center;font-family:inherit}
.btn-primary{background:#0f172a;color:#fff;border:none}
.btn-row{display:flex;gap:8px}
.btn-row .btn{flex:1}
.empty{text-align:center;padding:40px;color:#94a3b8;font-size:14px}
.hidden{display:none}
.import-btn{display:flex;align-items:center;gap:4px;background:#10b981;color:#fff;border:none;padding:6px 12px;font-size:13px;border-radius:10px;font-weight:600;cursor:pointer;font-family:inherit}
.place-list{display:flex;flex-direction:column;gap:6px;max-height:60vh;overflow-y:auto}
.place-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:1.5px solid #e2e8f0;background:#f8fafc;cursor:pointer;font-family:inherit;text-align:left;width:100%}
.place-item:hover{background:#eff6ff;border-color:#93c5fd}
.place-item .pi-name{font-weight:700;font-size:14px;color:#1e293b}
.place-item .pi-addr{font-size:12px;color:#64748b;margin-top:2px}
.place-item .pi-check{width:20px;height:20px;border-radius:6px;border:1.5px solid #e2e8f0;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.place-item.selected .pi-check{background:#10b981;border-color:#10b981}
.import-count{font-size:13px;color:#64748b;font-weight:500;text-align:center}
.loading-spinner{text-align:center;padding:30px;color:#64748b;font-size:14px}
.map-toggle{position:absolute;left:-32px;top:50%;transform:translateY(-50%);width:32px;height:48px;border-radius:8px 0 0 8px;background:#fff;border:1px solid #e2e8f0;border-right:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;box-shadow:-2px 0 6px rgba(0,0,0,.08)}
.map-panel{position:relative;overflow:visible}
.map-panel.collapsed .map-inner{display:none}
.map-panel.collapsed{flex:0 0 0px;min-width:0}
.map-inner{display:flex;flex-direction:column;flex:1;height:100vh}
.edit-panel{display:none;flex-direction:column;height:100vh;overflow-y:auto;background:#fff;padding:24px 20px}
.edit-panel h2{font-size:17px;font-weight:800;color:#1e293b;margin-bottom:16px}
.edit-panel .form-stack{gap:12px}
.edit-panel .form-stack label{font-size:12px;font-weight:600;color:#64748b}
.edit-panel .form-stack input,.edit-panel .form-stack select,.edit-panel .form-stack textarea{padding:10px 12px;border-radius:10px;border:1.5px solid #e2e8f0;font-size:14px;outline:none;width:100%;background:#f8fafc;font-family:inherit}
.edit-panel .form-stack textarea{min-height:80px;resize:vertical}
.sync-btn{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:8px;border:1.5px solid #e2e8f0;background:#fff;font-size:11px;font-weight:600;color:#64748b;cursor:pointer;font-family:inherit;white-space:nowrap}
.sync-btn.synced{border-color:#6ee7b7;background:#ecfdf5;color:#059669}
</style>
</head>
<body>

<div class="wrapper">
<div class="container">
  <div class="header" style="display:flex;align-items:center;justify-content:space-between">
    <div>
      <h1>🗂 飛び込みプランナー</h1>
      <p>LIENS BOT 営業ツール</p>
    </div>
    <button class="sync-btn" id="syncBtn" onclick="handleSync()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0115.36-6.36L21 8"/><path d="M3 22v-6h6"/><path d="M12 21a9 9 0 01-6.36-2.64L3 16"/></svg>
      <span id="syncLabel">同期</span>
    </button>
  </div>
  <div class="top-row">
    <input type="date" id="dateInput">
    <div style="flex:1"></div>
    <button class="import-btn hidden" id="importBtn" onclick="showImportModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span>マップから取込</span>
    </button>
    <button class="btn-route hidden" id="routeBtn" onclick="openRoute()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-6 4 4 8-8"/><path d="M17 7h4v4"/></svg>
      <span>ルート</span>
    </button>
  </div>
  <div class="summary" id="summary"></div>
  <div class="filters" id="filters"></div>
  <div class="cards" id="cards"></div>
  <button class="fab" onclick="showAddModal()">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
  </button>
</div>

<!-- PC Map Panel -->
<div class="map-panel" id="mapPanel">
  <button class="map-toggle" onclick="toggleMapPanel()" id="mapToggle" title="マップを閉じる">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
  </button>
  <div class="map-inner" id="mapInner">
    <div class="map-setup" id="mapSetup">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <h2>Googleマイマップを連携</h2>
      <p>訪問先をピン打ちしたマイマップのリンクを貼ると、ここに地図が表示されます。</p>
      <ol>
        <li><a href="https://www.google.com/maps/d/" target="_blank" style="color:#3b82f6;font-weight:600">Googleマイマップ</a> を開く</li>
        <li>「新しい地図を作成」→ 訪問先をピン打ち</li>
        <li>「共有」→「リンクを知っている全員」に変更</li>
        <li>共有リンクをコピーして下に貼り付け</li>
      </ol>
      <input id="mapUrlInput" placeholder="マイマップの共有リンクを貼り付け">
      <button class="btn btn-primary" onclick="setMapUrl()">地図を表示</button>
    </div>
    <div class="hidden" id="mapEmbed" style="display:none;flex-direction:column;flex:1">
      <div class="map-url-bar">
        <input id="mapUrlEdit" readonly>
        <button class="btn" onclick="clearMapUrl()" style="color:#ef4444;border-color:#fecaca">解除</button>
      </div>
      <iframe id="mapIframe" style="flex:1;width:100%;border:none" loading="lazy" allowfullscreen referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
  </div>
  <div class="edit-panel" id="editPanel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h2 style="margin:0" id="editPanelTitle">訪問先を編集</h2>
      <button class="icon-btn" onclick="closeEditPanel()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg></button>
    </div>
    <div class="form-stack">
      <div><label>店名</label><input id="ep_name" placeholder="店名"></div>
      <div><label>住所</label><input id="ep_address" placeholder="住所"></div>
      <div><label>カテゴリ</label><select id="ep_category"><option>飲食店</option><option>美容室</option><option>クリニック</option><option>旅館</option><option>小売店</option><option>その他</option></select></div>
      <div><label>メモ</label><textarea id="ep_memo" placeholder="メモ（課題・キーマン情報など）"></textarea></div>
      <div><label>ホームページURL</label><input id="ep_website" placeholder="https://example.com"></div>
      <button class="btn btn-primary" onclick="saveEditPanel()" style="margin-top:4px">保存</button>
    </div>
  </div>
</div>
</div>

<div class="overlay hidden" id="overlay" onclick="hideAddModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span>訪問先を追加</span>
      <button class="icon-btn" onclick="hideAddModal()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg></button>
    </div>
    <div class="form-stack" id="addForm">
      <input id="f_name" placeholder="店名 *">
      <input id="f_address" placeholder="住所">
      <select id="f_category"><option>飲食店</option><option>美容室</option><option>クリニック</option><option>旅館</option><option>小売店</option><option>その他</option></select>
      <textarea id="f_memo" placeholder="メモ（課題・キーマン情報など）"></textarea>
      <input id="f_website" placeholder="ホームページURL（例: example.com）">
      <button class="btn btn-primary" onclick="addVisit()">追加する</button>
    </div>
  </div>
</div>

<!-- Edit overlay -->
<div class="overlay hidden" id="editOverlay" onclick="hideEditModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span>編集</span>
      <button class="icon-btn" onclick="hideEditModal()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg></button>
    </div>
    <div class="form-stack">
      <input id="e_name" placeholder="店名">
      <input id="e_address" placeholder="住所">
      <select id="e_category"><option>飲食店</option><option>美容室</option><option>クリニック</option><option>旅館</option><option>小売店</option><option>その他</option></select>
      <textarea id="e_memo" placeholder="メモ（課題・キーマン情報など）"></textarea>
      <input id="e_website" placeholder="ホームページURL">
      <button class="btn btn-primary" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<!-- Import from map overlay -->
<div class="overlay hidden" id="importOverlay" onclick="hideImportModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span>マップから取込</span>
      <button class="icon-btn" onclick="hideImportModal()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg></button>
    </div>
    <div class="import-count" id="importCount"></div>
    <div class="place-list" id="placeList"></div>
    <div style="margin-top:12px">
      <button class="btn btn-primary" style="width:100%" id="importSubmit" onclick="importSelected()">選択した訪問先を追加</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'sales-visits';
const STATUS = {
  pending: { label: '未訪問', color: '#94a3b8', bg: '#f1f5f9' },
  visited: { label: '訪問済', color: '#22c55e', bg: '#f0fdf4' },
  followup: { label: '要フォロー', color: '#f59e0b', bg: '#fffbeb' },
  rejected: { label: 'NG', color: '#ef4444', bg: '#fef2f2' },
};
const INITIAL = [{id:'1',name:'サンプル美容室',address:'福井市中央1-1-1',category:'美容室',memo:'オーナーが若い。LINE活用に興味ありそう',website:'https://example.com',status:'pending',order:0}];

// ============ GOOGLE DRIVE SYNC ============
const GCID = '155775695368-6cj0mtohrm24gnkpb3si2ofpmnfjkl2t.apps.googleusercontent.com';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.appdata';
const DRIVE_FILE = 'tobikomi_data.json';
const TOKEN_KEY = 'tobikomi_gtoken';
const TOKEN_EXP_KEY = 'tobikomi_gtoken_exp';
let gAccessToken = null, driveFileId = null, syncBusy = false;

function saveToken(token, expiresIn) {
  gAccessToken = token;
  const exp = Date.now() + (expiresIn - 60) * 1000;
  localStorage.setItem(TOKEN_KEY, token);
  localStorage.setItem(TOKEN_EXP_KEY, String(exp));
}
function loadToken() {
  const t = localStorage.getItem(TOKEN_KEY), exp = Number(localStorage.getItem(TOKEN_EXP_KEY) || 0);
  if (t && Date.now() < exp) { gAccessToken = t; return true; }
  gAccessToken = null; localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(TOKEN_EXP_KEY); return false;
}
function setSyncUI(label, ok) {
  document.getElementById('syncLabel').textContent = label;
  document.getElementById('syncBtn').classList.toggle('synced', ok);
}

function doLogin(callback) {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: GCID, scope: DRIVE_SCOPE,
    callback: async (resp) => {
      if (resp.error) { alert('ログインエラー: ' + (resp.error_description || resp.error)); return; }
      saveToken(resp.access_token, resp.expires_in || 3600);
      if (callback) await callback();
    }
  });
  client.requestAccessToken();
}

async function driveApi(path, opts = {}) {
  const r = await fetch('https://www.googleapis.com/' + path, {
    ...opts, headers: { 'Authorization': 'Bearer ' + gAccessToken, ...(opts.headers || {}) }
  });
  if (r.status === 401) { gAccessToken = null; localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(TOKEN_EXP_KEY); setSyncUI('同期', false); throw new Error('再ログインしてください'); }
  return r;
}

async function driveFindFile() {
  const r = await driveApi("drive/v3/files?spaces=appDataFolder&q=name%3D'" + DRIVE_FILE + "'&fields=files(id)");
  const j = await r.json();
  driveFileId = (j.files && j.files[0]) ? j.files[0].id : null;
  return driveFileId;
}

async function driveLoad() {
  syncBusy = true;
  try {
    await driveFindFile();
    if (!driveFileId) { syncBusy = false; return; }
    const r = await driveApi('drive/v3/files/' + driveFileId + '?alt=media');
    const data = await r.json();
    if (data.allData && typeof data.allData === 'object') {
      allData = mergeAllData(allData, data.allData);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
      if (data.mapUrl) localStorage.setItem('sales-visits-map', data.mapUrl);
      render();
    }
  } catch (e) { console.error('Drive load error:', e); }
  syncBusy = false;
}

function mergeAllData(local, remote) {
  const merged = { ...remote };
  Object.keys(local).forEach(date => {
    if (!merged[date]) { merged[date] = local[date]; return; }
    const map = new Map();
    merged[date].forEach(v => map.set(v.id, v));
    local[date].forEach(v => {
      const existing = map.get(v.id);
      if (!existing || (v.updatedAt || 0) >= (existing.updatedAt || 0)) map.set(v.id, v);
    });
    merged[date] = [...map.values()].sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
  });
  return merged;
}

async function driveSaveNow() {
  const mapUrl = localStorage.getItem('sales-visits-map') || '';
  const data = JSON.stringify({ allData, mapUrl });
  const meta = { name: DRIVE_FILE, mimeType: 'application/json', ...(!driveFileId ? { parents: ['appDataFolder'] } : {}) };
  const boundary = '---tobikomi';
  const body = '--' + boundary + '\r\nContent-Type:application/json;charset=UTF-8\r\n\r\n' + JSON.stringify(meta) + '\r\n--' + boundary + '\r\nContent-Type:application/json\r\n\r\n' + data + '\r\n--' + boundary + '--';
  const url = driveFileId
    ? 'upload/drive/v3/files/' + driveFileId + '?uploadType=multipart'
    : 'upload/drive/v3/files?uploadType=multipart';
  const method = driveFileId ? 'PATCH' : 'POST';
  const r = await driveApi(url, { method, headers: { 'Content-Type': 'multipart/related; boundary=' + boundary }, body });
  if (!r.ok) { const e = await r.json(); throw new Error(e.error && e.error.message || r.status); }
  if (!driveFileId) { const j = await r.json(); driveFileId = j.id; }
  setSyncUI('同期済', true);
}

let saveTimer = null;
function driveSave() {
  if (syncBusy) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => driveSaveNow().catch(e => console.error('Drive save error:', e)), 1500);
}

async function doSync() {
  setSyncUI('同期中...', false);
  try {
    await driveLoad();
    await driveSaveNow();
    setSyncUI('同期済', true);
  } catch (e) {
    if (e.message === '再ログインしてください') {
      setSyncUI('同期', false);
      doLogin(doSync);
    } else { setSyncUI('エラー', false); alert('同期エラー: ' + e.message); }
  }
}

async function handleSync() {
  if (!gAccessToken && !loadToken()) { doLogin(doSync); return; }
  await doSync();
}

let dragId = null;
let autoScrollRAF = null;

function getScrollContainer() {
  const c = document.querySelector('.container');
  return (window.innerWidth >= 768 && c.scrollHeight > c.clientHeight) ? c : document.documentElement;
}

function autoScroll(clientY) {
  if (autoScrollRAF) cancelAnimationFrame(autoScrollRAF);
  const edge = 60;
  const speed = 12;
  const sc = getScrollContainer();
  const isDoc = sc === document.documentElement;
  const rect = isDoc ? {top:0, bottom:window.innerHeight} : sc.getBoundingClientRect();
  let delta = 0;
  if (clientY < rect.top + edge) delta = -speed * (1 - (clientY - rect.top) / edge);
  else if (clientY > rect.bottom - edge) delta = speed * (1 - (rect.bottom - clientY) / edge);
  if (delta !== 0) {
    sc.scrollTop += delta;
    autoScrollRAF = requestAnimationFrame(() => autoScroll(clientY));
  }
}

function stopAutoScroll() {
  if (autoScrollRAF) { cancelAnimationFrame(autoScrollRAF); autoScrollRAF = null; }
}

function initDragAndDrop() {
  const cards = document.querySelectorAll('.card[draggable]');
  cards.forEach(card => {
    card.addEventListener('dragstart', e => {
      dragId = card.dataset.id;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      document.querySelectorAll('.card.drag-over').forEach(c => c.classList.remove('drag-over'));
      dragId = null;
      stopAutoScroll();
    });
    card.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (card.dataset.id !== dragId) card.classList.add('drag-over');
      autoScroll(e.clientY);
    });
    card.addEventListener('dragleave', () => {
      card.classList.remove('drag-over');
    });
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('drag-over');
      stopAutoScroll();
      if (!dragId || card.dataset.id === dragId) return;
      const visits = getVisits();
      const fromIdx = visits.findIndex(v => v.id === dragId);
      const toIdx = visits.findIndex(v => v.id === card.dataset.id);
      if (fromIdx < 0 || toIdx < 0) return;
      const [item] = visits.splice(fromIdx, 1);
      visits.splice(toIdx, 0, item);
      setVisits(visits.map((v,i) => ({...v, order:i})));
    });
  });
  // cardsコンテナでもdragoverを拾ってスクロール
  const container = document.getElementById('cards');
  container.addEventListener('dragover', e => { autoScroll(e.clientY); });
  // タッチ対応
  cards.forEach(card => {
    const handle = card.querySelector('.drag-handle');
    if (!handle) return;
    let touchY = 0, clone = null, overCard = null;
    handle.addEventListener('touchstart', e => {
      dragId = card.dataset.id;
      touchY = e.touches[0].clientY;
      clone = card.cloneNode(true);
      clone.style.cssText = 'position:fixed;z-index:999;pointer-events:none;opacity:0.85;width:'+card.offsetWidth+'px;left:'+card.getBoundingClientRect().left+'px;top:'+card.getBoundingClientRect().top+'px;transition:none;';
      document.body.appendChild(clone);
      card.classList.add('dragging');
      e.preventDefault();
    }, {passive:false});
    handle.addEventListener('touchmove', e => {
      if (!clone) return;
      const cy = e.touches[0].clientY;
      const dy = cy - touchY;
      clone.style.top = (card.getBoundingClientRect().top + dy) + 'px';
      autoScroll(cy);
      // pointer-events:noneのcloneを一瞬隠してelementFromPointで下の要素を取得
      clone.style.display = 'none';
      const el = document.elementFromPoint(e.touches[0].clientX, cy);
      clone.style.display = '';
      const target = el ? el.closest('.card[draggable]') : null;
      if (overCard && overCard !== target) overCard.classList.remove('drag-over');
      if (target && target.dataset.id !== dragId) { target.classList.add('drag-over'); overCard = target; }
      e.preventDefault();
    }, {passive:false});
    handle.addEventListener('touchend', () => {
      stopAutoScroll();
      if (clone) { clone.remove(); clone = null; }
      card.classList.remove('dragging');
      if (overCard) {
        overCard.classList.remove('drag-over');
        const visits = getVisits();
        const fromIdx = visits.findIndex(v => v.id === dragId);
        const toIdx = visits.findIndex(v => v.id === overCard.dataset.id);
        if (fromIdx >= 0 && toIdx >= 0 && fromIdx !== toIdx) {
          const [item] = visits.splice(fromIdx, 1);
          visits.splice(toIdx, 0, item);
          setVisits(visits.map((v,i) => ({...v, order:i})));
        }
        overCard = null;
      }
      dragId = null;
    });
  });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }

// Map URL
function toEmbedUrl(url) {
  // Extract mid from any Google My Maps URL
  let m = url.match(/mid=([^&]+)/);
  if (m) return 'https://www.google.com/maps/d/u/0/embed?mid=' + m[1];
  // Already embed URL
  if (url.includes('/embed')) return url;
  // Try replacing /edit or /viewer with /embed
  return url.replace(/\/(edit|viewer)/, '/embed');
}

function setMapUrl() {
  const url = document.getElementById('mapUrlInput').value.trim();
  if (!url) return;
  const embedUrl = toEmbedUrl(url);
  localStorage.setItem('sales-visits-map', url);
  showMap(url, embedUrl);
  document.getElementById('importBtn').classList.remove('hidden');
  if (gAccessToken) driveSave();
}

let mapPlaces = [];
let selectedPlaces = new Set();

// 右パネルの状態: 'map' | 'collapsed' | 'edit'
let panelState = 'map';
let editPanelId = null;

function applyPanelState() {
  const panel = document.getElementById('mapPanel');
  const mapInner = document.getElementById('mapInner');
  const editPanel = document.getElementById('editPanel');
  const btn = document.getElementById('mapToggle');
  panel.style.flex = '';
  if (panelState === 'map') {
    panel.classList.remove('collapsed');
    mapInner.style.display = 'flex';
    editPanel.style.display = 'none';
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>';
    btn.title = 'マップを閉じる';
  } else if (panelState === 'collapsed') {
    panel.classList.add('collapsed');
    mapInner.style.display = 'none';
    editPanel.style.display = 'none';
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>';
    btn.title = 'マップを開く';
  } else if (panelState === 'edit') {
    panel.classList.remove('collapsed');
    panel.style.flex = '1';
    mapInner.style.display = 'none';
    editPanel.style.display = 'flex';
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>';

  }
}

function toggleMapPanel() {
  if (panelState === 'map') {
    panelState = 'collapsed';
  } else {
    if (panelState === 'edit' && !confirmIfDirty()) return;
    panelState = 'map';
    editPanelId = null;
  }
  applyPanelState();
}

function getEditPanelValues() {
  return {
    name: document.getElementById('ep_name').value.trim(),
    address: document.getElementById('ep_address').value.trim(),
    category: document.getElementById('ep_category').value,
    memo: document.getElementById('ep_memo').value.trim(),
    website: document.getElementById('ep_website').value.trim(),
  };
}

function isEditDirty() {
  if (!editPanelId) return false;
  const v = getVisits().find(x => x.id === editPanelId);
  if (!v) return false;
  const cur = getEditPanelValues();
  return cur.name !== v.name || cur.address !== (v.address||'') || cur.category !== v.category || cur.memo !== (v.memo||'') || cur.website !== (v.website||'');
}

function confirmIfDirty() {
  if (!isEditDirty()) return true;
  return confirm('変更が保存されていません。破棄しますか？');
}

function fillEditPanel(v) {
  document.getElementById('editPanelTitle').textContent = v.name + ' を編集';
  document.getElementById('ep_name').value = v.name;
  document.getElementById('ep_address').value = v.address || '';
  document.getElementById('ep_category').value = v.category;
  document.getElementById('ep_memo').value = v.memo || '';
  document.getElementById('ep_website').value = v.website || '';
}

function openEditPanel(id) {
  if (panelState === 'map') return;
  if (panelState === 'edit' && editPanelId === id) return;
  if (panelState === 'edit' && !confirmIfDirty()) return;
  const v = getVisits().find(x => x.id === id);
  if (!v) return;
  editPanelId = id;
  panelState = 'edit';
  applyPanelState();
  fillEditPanel(v);
}

function closeEditPanel() {
  if (!confirmIfDirty()) return;
  editPanelId = null;
  panelState = 'collapsed';
  applyPanelState();
}

function saveEditPanel() {
  if (!editPanelId) return;
  const cur = getEditPanelValues();
  const visits = getVisits();
  setVisits(visits.map(v => v.id === editPanelId ? {
    ...v,
    name: cur.name || v.name,
    address: cur.address,
    category: cur.category,
    memo: cur.memo,
    website: cur.website,
  } : v));
  // 保存後もedit状態を維持、更新されたデータを再表示
  const updated = getVisits().find(x => x.id === editPanelId);
  if (updated) fillEditPanel(updated);
}

async function fetchMapPlaces() {
  const mid = getMidFromStorage();
  if (!mid) { alert('先にマイマップのURLを設定してください'); return []; }
  const kmlUrl = 'https://www.google.com/maps/d/kml?forcekml=1&mid=' + mid;
  const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(kmlUrl);
  const res = await fetch(proxyUrl);
  const text = await res.text();
  const parser = new DOMParser();
  const doc = parser.parseFromString(text, 'text/xml');
  const placemarks = doc.querySelectorAll('Placemark');
  const places = [];
  placemarks.forEach(pm => {
    const name = (pm.querySelector('name') || {}).textContent || '';
    const coords = (pm.querySelector('coordinates') || {}).textContent || '';
    const parts = coords.trim().split(',');
    const lng = parseFloat(parts[0]) || 0;
    const lat = parseFloat(parts[1]) || 0;
    places.push({ name: name.trim(), lat, lng, address: '', website: '' });
  });
  return places;
}

async function enrichPlaceData(place) {
  // 1. Overpass APIで近くのPOIからwebsite/address/phoneを取得
  try {
    const q = '[out:json];(node(around:150,' + place.lat + ',' + place.lng + ')["name"];way(around:150,' + place.lat + ',' + place.lng + ')["name"];);out tags;';
    const ovRes = await fetch('https://overpass-api.de/api/interpreter', { method: 'POST', body: 'data=' + encodeURIComponent(q), headers: {'Content-Type':'application/x-www-form-urlencoded'} });
    const ovData = await ovRes.json();
    // 名前が近いPOIを探す
    const normalize = s => s.replace(/[\s\u3000]/g, '').toLowerCase();
    const target = normalize(place.name);
    let bestMatch = null;
    for (const el of ovData.elements) {
      if (!el.tags || !el.tags.name) continue;
      const n = normalize(el.tags.name);
      if (n === target || n.includes(target) || target.includes(n)) {
        if (!bestMatch || (el.tags.website && !bestMatch.tags.website)) bestMatch = el;
      }
    }
    if (bestMatch && bestMatch.tags) {
      if (bestMatch.tags.website) place.website = bestMatch.tags.website;
      if (bestMatch.tags['addr:full']) place.address = bestMatch.tags['addr:full'];
      else if (bestMatch.tags['addr:street']) {
        place.address = (bestMatch.tags['addr:province'] || '') + (bestMatch.tags['addr:city'] || '') + (bestMatch.tags['addr:street'] || '') + (bestMatch.tags['addr:housenumber'] || '');
      }
    }
  } catch {}
  // 2. 住所がまだなければNominatimで名前検索
  if (!place.address) {
    try {
      const params = 'format=json&q=' + encodeURIComponent(place.name) + '&accept-language=ja&limit=1&viewbox=' + (place.lng-0.01) + ',' + (place.lat+0.01) + ',' + (place.lng+0.01) + ',' + (place.lat-0.01) + '&bounded=1';
      const nmRes = await fetch('https://nominatim.openstreetmap.org/search?' + params);
      const nmData = await nmRes.json();
      if (nmData.length > 0) {
        place.address = nmData[0].display_name.replace(/,\s*日本$/, '');
      }
    } catch {}
  }
  // 3. それでもなければ座標からリバースジオコーディング
  if (!place.address) {
    try {
      const rvRes = await fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat=' + place.lat + '&lon=' + place.lng + '&accept-language=ja&zoom=18');
      const rvData = await rvRes.json();
      if (rvData.display_name) place.address = rvData.display_name.replace(/,\s*日本$/, '');
    } catch {}
  }
  return place;
}

async function showImportModal() {
  document.getElementById('importOverlay').classList.remove('hidden');
  document.getElementById('placeList').innerHTML = '<div class="loading-spinner">マップデータを読み込み中...</div>';
  document.getElementById('importCount').textContent = '';
  document.getElementById('importSubmit').disabled = true;
  selectedPlaces.clear();
  try {
    mapPlaces = await fetchMapPlaces();
    if (mapPlaces.length === 0) {
      document.getElementById('placeList').innerHTML = '<div class="loading-spinner">マップにピンが見つかりませんでした</div>';
      return;
    }
    document.getElementById('placeList').innerHTML = '<div class="loading-spinner">住所・HP情報を取得中... (0/' + mapPlaces.length + ')</div>';
    for (let i = 0; i < mapPlaces.length; i++) {
      await enrichPlaceData(mapPlaces[i]);
      document.getElementById('placeList').innerHTML = '<div class="loading-spinner">住所・HP情報を取得中... (' + (i+1) + '/' + mapPlaces.length + ')</div>';
    }
    renderPlaceList();
  } catch(e) {
    document.getElementById('placeList').innerHTML = '<div class="loading-spinner">読み込みに失敗しました: ' + e.message + '</div>';
  }
}

function renderPlaceList() {
  const existing = getVisits().map(v => v.name);
  document.getElementById('placeList').innerHTML = mapPlaces.map((p, i) => {
    const already = existing.includes(p.name);
    const sel = selectedPlaces.has(i);
    return '<button class="place-item' + (sel ? ' selected' : '') + (already ? '' : '') + '" onclick="togglePlace(' + i + ')"' + (already ? ' style="opacity:0.5"' : '') + '>' +
      '<div class="pi-check">' + (sel ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' : '') + '</div>' +
      '<div style="flex:1;min-width:0"><div class="pi-name">' + esc(p.name) + (already ? ' <span style="font-size:11px;color:#94a3b8">(登録済)</span>' : '') + '</div>' +
      '<div class="pi-addr">' + esc(p.address || ('📍 ' + p.lat.toFixed(4) + ', ' + p.lng.toFixed(4))) + '</div>' +
      (p.website ? '<div style="font-size:11px;color:#7c3aed;margin-top:2px">🔗 ' + esc(p.website.replace(new RegExp('^https?://'), '')) + '</div>' : '') +
      '</div></button>';
  }).join('');
  updateImportCount();
}

function togglePlace(i) {
  if (selectedPlaces.has(i)) selectedPlaces.delete(i);
  else selectedPlaces.add(i);
  renderPlaceList();
}

function updateImportCount() {
  const n = selectedPlaces.size;
  document.getElementById('importCount').textContent = n > 0 ? n + '件選択中' : 'タップして選択してください';
  document.getElementById('importSubmit').disabled = n === 0;
}

function hideImportModal() {
  document.getElementById('importOverlay').classList.add('hidden');
}

function importSelected() {
  if (selectedPlaces.size === 0) return;
  const visits = getVisits();
  selectedPlaces.forEach(i => {
    const p = mapPlaces[i];
    visits.push({
      id: genId(),
      name: p.name,
      address: p.address || '',
      category: 'その他',
      memo: '',
      website: p.website || '',
      status: 'pending',
      order: visits.length,
    });
  });
  setVisits(visits);
  hideImportModal();
}

  init();
  loadMap();
} catch(e) {
  document.body.innerHTML = '<pre style="color:red;padding:20px">JS Error: ' + e.message + '\n' + e.stack + '</pre>';
}
